<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTC Math | Attendance Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary: #1e3a8a; /* Royal Blue */
            --accent: #d97706;  /* Deep Golden */
            --bg: #f8fafc;
            --white: #ffffff;
            --text-dark: #0f172a;
            --text-light: #64748b;
            --danger: #be123c;
            --success: #15803d;
        }

        body {
            font-family: 'Inter', 'Hind Siliguri', sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* Header Area */
        .header {
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
            padding: 40px 20px;
            text-align: center;
            color: var(--white);
            border-bottom: 5px solid var(--accent);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .header h1 { font-size: 24px; margin: 0; font-weight: 700; letter-spacing: 0.5px; }
        .header p { font-size: 14px; opacity: 0.9; margin-top: 5px; font-weight: 400; }

        .container { max-width: 450px; margin: -30px auto 50px; padding: 0 15px; }

        /* Card Design */
        .card {
            background: var(--white);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        /* Modern Tabs */
        .tab-group {
            display: flex;
            background: #f1f5f9;
            border-radius: 14px;
            padding: 5px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
            font-family: inherit;
        }

        .tab-btn.active {
            background: var(--white);
            color: var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Status Indicator */
        .status-box {
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-active { background: #ecfdf5; color: var(--success); }
        .status-inactive { background: #fef2f2; color: var(--danger); }

        /* Form Inputs */
        label { display: block; font-size: 13px; font-weight: 700; color: var(--text-light); margin-bottom: 8px; text-transform: uppercase; }
        
        select, input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-family: inherit;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        select:focus, input:focus { border-color: var(--primary); outline: none; background: #f8fafc; }

        /* Premium Buttons */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            font-family: inherit;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(30, 58, 138, 0.2); }

        .btn-excel { background: #166534; color: white; margin-top: 15px; font-size: 14px; }
        .btn-danger { background: #fff1f2; color: var(--danger); border: 1.5px solid #fecaca; margin-top: 20px; font-size: 14px; }
        .btn-danger:hover { background: var(--danger); color: white; }

        /* QR Section */
        #qrcode {
            margin: 20px auto;
            background: white;
            padding: 15px;
            border-radius: 15px;
            border: 2px dashed var(--accent);
            display: none;
            width: fit-content;
        }

        /* Toasts */
        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: none;
            z-index: 9999;
        }

    </style>
</head>
<body>

<div class="header">
    <h1>MATHEMATICS DEPARTMENT</h1>
    <p>Govt. Titumir College | Digital Presence</p>
</div>

<div class="container">
    <div class="card">
        <div class="tab-group">
            <button id="s-tab" class="tab-btn active" onclick="switchView('student')">শিক্ষার্থী পোর্টাল</button>
            <button id="t-tab" class="tab-btn" onclick="switchView('teacher')">শিক্ষক প্যানেল</button>
        </div>

        <div id="student-view">
            <div id="status-display" class="status-box status-inactive">
                <i class="fa-solid fa-circle-dot"></i> বর্তমানে কোনো ক্লাস নেই
            </div>

            <label><i class="fa-solid fa-id-badge"></i> আপনার নাম নির্বাচন করুন</label>
            <select id="student-list">
                <option value="">তালিকায় সার্চ করুন...</option>
            </select>

            <button class="btn btn-primary" onclick="submitAttendance()">
                <i class="fa-solid fa-check-double"></i> হাজিরা নিশ্চিত করুন
            </button>
            <p style="text-align:center; font-size: 11px; color: var(--text-light); margin-top: 15px;">
                <i class="fa-solid fa-location-dot"></i> আপনার অবস্থান ও ডিভাইস যাচাই করা হচ্ছে।
            </p>
        </div>

        <div id="teacher-view" style="display:none;">
            <div id="auth-panel">
                <label>সিকিউরিটি পিন</label>
                <input type="password" id="admin-pin" placeholder="••••••••">
                <button class="btn btn-primary" onclick="adminLogin()">লগইন করুন</button>
            </div>

            <div id="admin-panel" style="display:none;">
                <label>লেকচারার</label>
                <select id="teacher-name">
                    <option value="NJ">Nazia Jahan (NJ)</option>
                    <option value="MR">Md. Motlubar Rahman (MR)</option>
                    <option value="RI">Md. Rafiqul Islam (RI)</option>
                </select>

                <button class="btn btn-primary" onclick="startClass()">
                    <i class="fa-solid fa-play"></i> নতুন ক্লাস শুরু করুন
                </button>

                <div id="qrcode"></div>

                <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee;">
                    <button class="btn btn-excel" onclick="downloadReport()">
                        <i class="fa-solid fa-file-excel"></i> এক্সেল রিপোর্ট ডাউনলোড
                    </button>
                    
                    <button class="btn btn-danger" onclick="clearAllData()">
                        <i class="fa-solid fa-trash-can"></i> ডাটাবেজ সম্পূর্ণ রিসেট করুন
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const SCRIPT_URL = "YOUR_WEB_APP_URL"; // আপনার গুগল স্ক্রিপ্ট URL
    let currentLec = 0;
    let isLocked = false;

    // স্যাম্পল ডাটা (আপনার লিস্ট অনুযায়ী লোড হবে)
    const students = [
        {"sl": 7, "name": "ABDULLAH AL MAMUN"},
        {"sl": 65, "name": "HASIRUL ISLAM TAAIF"},
        {"sl": 1, "name": "MD. OBAIDUR RAHMAN"}
    ];

    async function syncStatus() {
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getStatus`);
            const data = await res.json();
            currentLec = data.lec;
            isLocked = data.locked;
            updateUI();
        } catch(e) { console.log("Offline"); }
    }

    function updateUI() {
        const box = document.getElementById('status-display');
        if (isLocked) {
            box.className = "status-box status-inactive";
            box.innerHTML = `<i class="fa-solid fa-lock"></i> হাজিরা নেওয়া বন্ধ`;
        } else if (currentLec > 0) {
            box.className = "status-box status-active";
            box.innerHTML = `<i class="fa-solid fa-broadcast-tower fa-beat"></i> চলমান: লেকচার ${currentLec}`;
        }
    }

    async function submitAttendance() {
        const roll = document.getElementById('student-list').value;
        if(!roll) return showToast("আপনার নাম সিলেক্ট করুন!", "#be123c");
        
        showToast("যাচাই করা হচ্ছে...", "#1e3a8a");
        
        // GPS & Device logic here
        await fetch(SCRIPT_URL, {
            method: 'POST', mode: 'no-cors',
            body: JSON.stringify({ action: "submitAttendance", roll: roll, lecture: currentLec })
        });
        showToast("হাজিরা সফলভাবে জমা হয়েছে! ✅", "#15803d");
    }

    async function clearAllData() {
        if(confirm("সাবধান! ডাটাবেজের সব রেকর্ড মুছে যাবে। আপনি কি নিশ্চিত?")) {
            showToast("ডাটা মুছে ফেলা হচ্ছে...", "#be123c");
            await fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ action: "resetData", secret: "TMC@2026" })
            });
            location.reload();
        }
    }

    function downloadReport() {
        window.open(SCRIPT_URL + "?action=downloadExcel", '_blank');
    }

    function adminLogin() {
        if(document.getElementById('admin-pin').value === "TMC@2026") {
            document.getElementById('auth-panel').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        } else { alert("ভুল পিন!"); }
    }

    function startClass() {
        currentLec++;
        const qrDiv = document.getElementById('qrcode');
        qrDiv.style.display = "block"; qrDiv.innerHTML = "";
        new QRCode(qrDiv, { text: "GTC-MATH-"+currentLec, width: 160, height: 160 });
        showToast("লেকচার " + currentLec + " শুরু হয়েছে", "#15803d");
    }

    function switchView(v) {
        document.getElementById('student-view').style.display = v === 'student' ? 'block' : 'none';
        document.getElementById('teacher-view').style.display = v === 'teacher' ? 'block' : 'none';
        document.getElementById('s-tab').classList.toggle('active', v === 'student');
        document.getElementById('t-tab').classList.toggle('active', v === 'teacher');
    }

    function showToast(m, b) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.background = b; t.style.display = "block";
        setTimeout(() => t.style.display = "none", 3000);
    }

    window.onload = () => {
        const sel = document.getElementById('student-list');
        students.forEach(s => sel.add(new Option(`${s.sl}. ${s.name}`, s.sl)));
        syncStatus();
    }
</script>
</body>
</html>
