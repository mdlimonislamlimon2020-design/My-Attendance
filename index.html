
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Dept Attendance - TMC</title>
    <meta name="theme-color" content="#0052D4">
    <link rel="apple-touch-icon" href="https://i.ibb.co/Xrn3XTr/7763.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0052D4; --gold: #FFD700; --bg: #f4f7f6; }
        body { font-family: 'Hind Siliguri', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .header { background: linear-gradient(135deg, #004e92, #000428); color: white; padding: 25px 15px; text-align: center; border-bottom: 4px solid var(--gold); }
        .logo { background: white; width: 60px; height: 60px; margin: 0 auto 10px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo img { width: 85%; }
        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; background: #eee; border-radius: 10px; padding: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: inherit; }
        .tab-btn.active { background: var(--blue); color: white; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: inherit; margin-top: 10px; font-size: 16px; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: #10b981; color: white; }
        .status-msg { padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; display: none; font-weight: bold; }
    </style>
</head>
<body>

<header class="header">
    <div class="logo"><img src="https://i.ibb.co/Xrn3XTr/7763.png" alt="TMC Logo"></div>
    <h2 style="margin:0;">MATHEMATICS DEPARTMENT</h2>
    <p style="margin:5px 0 0; opacity: 0.8;">Govt. Titumir College, Dhaka</p>
</header>

<div class="container">
    <div id="msg" class="status-msg"></div>

    <div class="card">
        <div class="tabs">
            <button id="t-tab" class="tab-btn active" onclick="showTab('teacher')">শিক্ষক</button>
            <button id="s-tab" class="tab-btn" onclick="showTab('student')">শিক্ষার্থী</button>
        </div>

        <div id="teacher-section">
            <input type="password" id="admin-pass" placeholder="অ্যাডমিন পাসওয়ার্ড লিখুন">
            <div id="admin-controls" style="display:none;">
                <select id="teacher-name">
                    <option value="">-- শিক্ষক নির্বাচন করুন --</option>
                    <option value="Afsari Ahmad">Afsari Ahmad (HOD)</option>
                    <option value="Nazia Jahan">Nazia Jahan</option>
                    <option value="Motlubar Rahman">Dr. Motlubar Rahman</option>
                </select>
                <button class="btn btn-blue" onclick="handleStart()">🚀 ক্লাস শুরু করুন</button>
                <button class="btn btn-green" onclick="downloadReport()">📊 রিপোর্ট ডাউনলোড</button>
            </div>
            <button id="login-btn" class="btn btn-blue" onclick="adminLogin()">লগইন করুন</button>
        </div>

        <div id="student-section" style="display:none;">
            <div id="class-info" style="background:#e0f2fe; padding:10px; border-radius:8px; margin-bottom:10px; font-size:14px; text-align:center;">
                লোড হচ্ছে...
            </div>
            <input type="number" id="student-sl" placeholder="আপনার সিরিয়াল নম্বর (উদা: ৭)">
            <button class="btn btn-blue" onclick="handleAttendance()">✅ হাজিরা দিন</button>
        </div>
    </div>
</div>

<script>
    // ডাটাবেস লোড
    let db = JSON.parse(localStorage.getItem('TMC_DB')) || {
        currentLecture: 0,
        active: false,
        teacher: '',
        attendance: {}
    };

    function saveDB() {
        localStorage.setItem('TMC_DB', JSON.stringify(db));
    }

    function showTab(type) {
        document.getElementById('teacher-section').style.display = type === 'teacher' ? 'block' : 'none';
        document.getElementById('student-section').style.display = type === 'student' ? 'block' : 'none';
        document.getElementById('t-tab').classList.toggle('active', type === 'teacher');
        document.getElementById('s-tab').classList.toggle('active', type === 'student');
        updateStatus();
    }

    function adminLogin() {
        const pass = document.getElementById('admin-pass').value;
        if(pass === "TMC@2026") {
            document.getElementById('admin-controls').style.display = 'block';
            document.getElementById('admin-pass').style.display = 'none';
            document.getElementById('login-btn').style.display = 'none';
        } else {
            notify("ভুল পাসওয়ার্ড!", "#ef4444");
        }
    }

    function handleStart() {
        const t = document.getElementById('teacher-name').value;
        if(!t) return alert("শিক্ষক সিলেক্ট করুন");
        db.currentLecture++;
        db.active = true;
        db.teacher = t;
        saveDB();
        notify(`লেকচার ${db.currentLecture} শুরু হয়েছে`, "#10b981");
    }

    function updateStatus() {
        const info = document.getElementById('class-info');
        if(db.active) {
            info.innerHTML = `🟢 চলমান: <b>লেকচার ${db.currentLecture}</b><br>শিক্ষক: ${db.teacher}`;
            info.style.color = "#0369a1";
        } else {
            info.innerHTML = "🔴 বর্তমানে কোনো ক্লাস চলছে না";
            info.style.color = "#ef4444";
        }
    }

    function handleAttendance() {
        if(!db.active) return notify("বর্তমানে কোনো ক্লাস চলছে না", "#ef4444");
        const sl = document.getElementById('student-sl').value;
        if(!sl) return notify("সিরিয়াল নম্বর দিন", "#ef4444");

        const key = `lec_${db.currentLecture}`;
        if(!db.attendance[sl]) db.attendance[sl] = [];
        
        if(db.attendance[sl].includes(db.currentLecture)) {
            notify("আপনি ইতিপূর্বে হাজিরা দিয়েছেন", "#f59e0b");
        } else {
            db.attendance[sl].push(db.currentLecture);
            saveDB();
            notify("হাজিরা সফল হয়েছে!", "#10b981");
            document.getElementById('student-sl').value = "";
        }
    }

    function downloadReport() {
        let csv = "\uFEFFSerial,Attendance_Count\n";
        for(let sl in db.attendance) {
            csv += `${sl},${db.attendance[sl].length}\n`;
        }
        const blob = new Blob([csv], {type: 'text/csv'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "Attendance_Report.csv";
        link.click();
    }

    function notify(msg, color) {
        const el = document.getElementById('msg');
        el.innerText = msg;
        el.style.background = color;
        el.style.color = "white";
        el.style.display = "block";
        setTimeout(() => el.style.display = "none", 3000);
    }

    window.onload = updateStatus;
</script>
</body>
</html>
