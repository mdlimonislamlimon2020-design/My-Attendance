<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dept. of Mathematics | Titumir College</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #1e3a8a; --accent: #fbbf24; --danger: #ef4444; --white: #ffffff; }
        body { font-family: 'Hind Siliguri', sans-serif; background: #f1f5f9; margin: 0; }
        
        /* Header & Logo */
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--accent); }
        .logo-img { width: 80px; height: auto; margin-bottom: 10px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
        .header h1 { margin: 5px 0; font-size: 22px; }
        .header p { margin: 0; font-size: 14px; opacity: 0.9; }

        .container { max-width: 480px; margin: 20px auto; padding: 10px; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        
        select, input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin: 5px 0; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-main:active { transform: scale(0.98); }
        .btn-lock { background: var(--danger); color: white; }
        
        .tab-box { display: flex; background: #f1f5f9; border-radius: 12px; padding: 5px; margin-bottom: 25px; }
        .tab { flex: 1; padding: 12px; cursor: pointer; border-radius: 10px; font-weight: 600; color: #64748b; }
        .tab.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        #qr-box { margin: 20px auto; display: none; justify-content: center; background: white; padding: 15px; border-radius: 15px; border: 2px dashed #cbd5e1; }
        .security-info { font-size: 12px; color: #ef4444; margin-top: 10px; font-weight: bold; }
        #msg { padding: 10px; border-radius: 8px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://i.ibb.co/Xrn3XTr/7763.png" alt="Titumir College Logo" class="logo-img">
    <h1>DEPARTMENT OF MATHEMATICS</h1>
    <p>Government Titumir College, Dhaka</p>
</div>

<div class="container">
    <div class="card">
        <div class="tab-box">
            <div id="t-tab" class="tab active" onclick="switchView('teacher')">টিচার প্যানেল</div>
            <div id="s-tab" class="tab" onclick="switchView('student')">শিক্ষার্থী পোর্টাল</div>
        </div>

        <div id="teacher-section">
            <label style="display:block; text-align:left; font-weight:600;">কোর্স শিক্ষক নির্বাচন করুন:</label>
            <select id="teacher-select">
                <option value="">-- শিক্ষক সিলেক্ট করুন --</option>
                <option value="MR">Dr. Md Motlubar Rahman (MR)</option>
                <option value="RI">Md. Rafiqul Islam (RI)</option>
                <option value="ZH">Zakir Hossain (ZH)</option>
                <option value="RA">Roksana Akter (RA)</option>
                <option value="NJ">Nazia Jahan (NJ)</option>
                <option value="BF">Bibi Fatema (BF)</option>
                <option value="MC">Milton Chowdhury (MC)</option>
            </select>
            
            <div id="qr-box"><div id="qrcode"></div></div>

            <button class="btn btn-main" onclick="generateLecture()">নতুন লেকচার শুরু করুন</button>
            <button id="lock-btn" class="btn btn-lock" style="display:none;" onclick="toggleLock()">🔒 রুম লক করুন</button>
            <button class="btn" style="background:#059669; color:white" onclick="exportData()">রিপোর্ট ডাউনলোড (Excel)</button>
        </div>

        <div id="student-section" style="display:none;">
            <div id="lec-status" style="font-weight:bold; color:var(--primary); margin-bottom:15px;"></div>
            <input type="number" id="roll-input" placeholder="আপনার রোল নম্বর লিখুন">
            <button class="btn btn-main" onclick="verifyAndSubmit()">হাজিরা নিশ্চিত করুন</button>
            <p class="security-info">⚠️ জিপিএস এবং ডিভাইস ভেরিফিকেশন সক্রিয়</p>
        </div>

        <div id="msg"></div>
    </div>
</div>

<script>
    // আপডেট করা জিপিএস লোকেশন ও নাম
    const DEPT_LAT = 23.781898; 
    const DEPT_LON = 90.408503;
    const MAX_DIST = 0.15; // ১৫০ মিটার সীমানা

    let lectureNo = parseInt(localStorage.getItem('lectureNo')) || 0;
    let attendance = JSON.parse(localStorage.getItem('mathAttendance')) || {};
    let lecDetails = JSON.parse(localStorage.getItem('lecDetails')) || {};
    let deviceLog = JSON.parse(localStorage.getItem('deviceLog')) || {}; 
    let isLocked = false;

    function switchView(view) {
        document.getElementById('teacher-section').style.display = view === 'teacher' ? 'block' : 'none';
        document.getElementById('student-section').style.display = view === 'student' ? 'block' : 'none';
        document.getElementById('t-tab').className = view === 'teacher' ? 'tab active' : 'tab';
        document.getElementById('s-tab').className = view === 'student' ? 'tab active' : 'tab';
        if(view === 'student') {
            document.getElementById('lec-status').innerText = lectureNo > 0 ? `চলমান লেকচার: ${lectureNo} (শিক্ষক: ${lecDetails[lectureNo] || 'N/A'})` : "বর্তমানে কোনো লেকচার চলছে না";
        }
    }

    function generateLecture() {
        const tCode = document.getElementById('teacher-select').value;
        if(!tCode) return alert("দয়া করে একজন শিক্ষক নির্বাচন করুন!");
        
        lectureNo++;
        lecDetails[lectureNo] = tCode;
        localStorage.setItem('lectureNo', lectureNo);
        localStorage.setItem('lecDetails', JSON.stringify(lecDetails));

        document.getElementById('qr-box').style.display = "flex";
        document.getElementById('lock-btn').style.display = "block";
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { 
            text: "MATH-DEPT-" + tCode + "-" + Date.now(), 
            width: 180, 
            height: 180 
        });
        
        notify("লেকচার " + lectureNo + " শুরু হয়েছে!", "green");
    }

    function toggleLock() {
        isLocked = !isLocked;
        document.getElementById('lock-btn').innerText = isLocked ? "🔓 হাজিরা পুনরায় খুলুন" : "🔒 রুম লক করুন";
        notify(isLocked ? "এই লেকচারের হাজিরা বন্ধ করা হয়েছে" : "হাজিরা পুনরায় চালু হয়েছে", isLocked ? "red" : "green");
    }

    async function verifyAndSubmit() {
        if(isLocked) return notify("দুঃখিত, এই লেকচারের হাজিরা বন্ধ!", "red");
        if(lectureNo === 0) return notify("কোনো লেকচার শুরু হয়নি!", "orange");

        const roll = document.getElementById('roll-input').value.trim();
        if(!roll) return notify("অনুগ্রহ করে আপনার রোল নম্বর দিন!", "orange");

        // ডিভাইস সিকিউরিটি চেক
        const fingerprint = btoa(navigator.userAgent + screen.width).slice(0, 15);
        if(deviceLog[lectureNo] && deviceLog[lectureNo][fingerprint]) {
            if(deviceLog[lectureNo][fingerprint] !== roll) {
                return notify("একটি ফোন থেকে কেবল একজনই হাজিরা দিতে পারবে!", "red");
            }
        }

        if (!navigator.geolocation) return notify("আপনার ফোনের GPS অন করুন!", "red");

        notify("লোকেশন ভেরিফাই করা হচ্ছে...", "#1e3a8a");
        navigator.geolocation.getCurrentPosition((pos) => {
            if(pos.coords.accuracy > 150) return notify("জিপিএস সিগন্যাল দুর্বল! ফেক জিপিএস বন্ধ রাখুন।", "red");

            const dist = getDistance(pos.coords.latitude, pos.coords.longitude, DEPT_LAT, DEPT_LON);
            
            if(dist > MAX_DIST) {
                notify("আপনি ডিপার্টমেন্টের বাইরে অবস্থান করছেন! (দূরত্ব: " + (dist*1000).toFixed(0) + " মিটার)", "red");
            } else {
                saveAttendance(roll, fingerprint);
            }
        }, () => notify("লোকেশন এক্সেস দিন নতুবা হাজিরা হবে না!", "red"), {enableHighAccuracy: true});
    }

    function saveAttendance(roll, fingerprint) {
        if(!attendance[roll]) attendance[roll] = {};
        if(attendance[roll][lectureNo]) return notify("আপনার হাজিরা ইতিমধ্যে নেওয়া হয়েছে!", "blue");

        attendance[roll][lectureNo] = 1;
        if(!deviceLog[lectureNo]) deviceLog[lectureNo] = {};
        deviceLog[lectureNo][fingerprint] = roll;

        localStorage.setItem('mathAttendance', JSON.stringify(attendance));
        localStorage.setItem('deviceLog', JSON.stringify(deviceLog));
        
        notify("ধন্যবাদ! রোল " + roll + ", হাজিরা গৃহীত হয়েছে। ✅", "green");
        document.getElementById('roll-input').value = "";
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1) * Math.PI / 180;
        const dLon = (lon2-lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function exportData() {
        if(Object.keys(attendance).length === 0) return alert("কোনো ডাটা নেই!");
        let csv = "Roll," + Object.keys(lecDetails).map(l => `Lec ${l} (${lecDetails[l]})`).join(",") + ",Total Attendance\n";
        for(let r in attendance) {
            let row = [r], sum = 0;
            for(let l in lecDetails) {
                let v = attendance[r][l] || 0;
                row.push(v); if(v===1) sum++;
            }
            row.push(sum); csv += row.join(",") + "\n";
        }
        const blob = new Blob([csv], {type: 'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "Math_Dept_Report.csv"; a.click();
    }

    function notify(t, c) {
        const m = document.getElementById('msg');
        m.innerText = t; m.style.backgroundColor = c === 'green' ? '#dcfce7' : c === 'red' ? '#fee2e2' : '#e0f2fe';
        m.style.color = c === 'green' ? '#166534' : c === 'red' ? '#991b1b' : '#1e3a8a';
        m.style.display = "block";
    }
</script>
</body>
</html>
