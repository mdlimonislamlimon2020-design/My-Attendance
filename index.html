<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTC Math Pro | Attendance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary: #1e3a8a; --accent: #d97706; --bg: #f1f5f9;
            --white: #ffffff; --text-dark: #0f172a; --danger: #e11d48; --success: #10b981;
        }

        body { font-family: 'Inter', 'Hind Siliguri', sans-serif; background: var(--bg); margin: 0; color: var(--text-dark); }

        /* Premium Header */
        .header {
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
            padding: 50px 20px; text-align: center; color: var(--white);
            border-bottom: 6px solid var(--accent); box-shadow: 0 10px 30px rgba(30,58,138,0.2);
        }
        .header h1 { font-size: 28px; margin: 0; font-weight: 800; letter-spacing: 1px; }
        .header p { font-size: 14px; opacity: 0.8; margin-top: 8px; }

        .container { max-width: 480px; margin: -40px auto 60px; padding: 0 20px; }

        /* Card Setup */
        .main-card {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-radius: 28px; padding: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Tabs Logic: Teacher First */
        .tab-switcher {
            display: flex; background: #e2e8f0; border-radius: 16px; padding: 6px; margin-bottom: 30px;
        }
        .tab-btn {
            flex: 1; padding: 14px; border: none; background: none; font-weight: 700;
            color: #64748b; cursor: pointer; border-radius: 12px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tab-btn.active { background: var(--white); color: var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.08); }

        /* Forms & Inputs */
        .input-group { margin-bottom: 22px; }
        label { display: block; font-size: 12px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
        input, select {
            width: 100%; padding: 16px; border: 2px solid #cbd5e1; border-radius: 14px;
            font-size: 16px; transition: 0.3s; box-sizing: border-box;
        }
        input:focus, select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(30,58,138,0.1); }

        /* Buttons */
        .btn {
            width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: 700;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(30,58,138,0.3); }
        .btn-danger { background: #fff1f2; color: var(--danger); border: 1px solid #fecaca; margin-top: 20px; font-size: 14px; }
        .btn-danger:hover { background: var(--danger); color: white; }

        /* Live Status Badge */
        .status-badge {
            padding: 12px; border-radius: 14px; text-align: center; font-weight: 700; font-size: 14px; margin-bottom: 25px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .active-class { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .no-class { background: #f1f5f9; color: #64748b; }

        /* QR Styling */
        #qrcode { margin: 25px auto; padding: 20px; background: white; border-radius: 20px; border: 3px solid #e2e8f0; display: none; width: fit-content; }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 16px 32px; border-radius: 50px; color: white; font-weight: 600;
            display: none; z-index: 1000; animation: slideDown 0.4s ease-out;
        }
        @keyframes slideDown { from { top: -50px; } to { top: 20px; } }
    </style>
</head>
<body>

<div class="header">
    <h1>Mathematics Department</h1>
    <p> Govt. Titumir College</p>
</div>

<div class="container">
    <div class="main-card">
        <div class="tab-switcher">
            <button id="t-tab" class="tab-btn active" onclick="switchTab('teacher')">টিচার প্যানেল</button>
            <button id="s-tab" class="tab-btn" onclick="switchTab('student')">স্টুডেন্ট পোর্টাল</button>
        </div>

        <div id="teacher-section">
            <div id="admin-login">
                <div class="input-group">
                    <label>অ্যাডমিন সিকিউরিটি পিন</label>
                    <input type="password" id="pin" placeholder="••••">
                </div>
                <button class="btn btn-primary" onclick="login()">প্যানেল আনলক করুন</button>
            </div>

            <div id="admin-controls" style="display:none;">
                <div class="input-group">
                    <label>শিক্ষক নির্বাচন করুন</label>
                    <select id="t-name">
                        <option value="Nazia">Nazia Jahan (Madam)</option>
                        <option value="Motlubar">Md. Motlubar Rahman (Sir)</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="initiateClass()">
                    <i class="fa-solid fa-bolt"></i> ক্লাস শুরু করুন
                </button>
                
                <div id="qrcode"></div>
                <button class="btn btn-danger" onclick="wipeData()">
                    <i class="fa-solid fa-trash-arrow-up"></i> সমস্ত ডাটা মুছুন (Reset)
                </button>
            </div>
        </div>

        <div id="student-section" style="display:none;">
            <div id="live-indicator" class="status-badge no-class">
                <i class="fa-solid fa-circle-notch fa-spin"></i> স্ট্যাটাস চেক করা হচ্ছে...
            </div>
            
            <div class="input-group">
                <label>আপনার পূর্ণ নাম (রোল অনুযায়ী)</label>
                <select id="std-name">
                    <option value="">নাম খুঁজুন...</option>
                </select>
            </div>
            <button class="btn btn-primary" id="att-btn" onclick="postAttendance()" disabled>
                <i class="fa-solid fa-signature"></i> হাজিরা নিশ্চিত করুন
            </button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const SCRIPT_URL = "YOUR_APPS_SCRIPT_URL_HERE"; // আপনার দেওয়া স্ক্রিপ্ট ইউআরএল
    let currentLec = 0;

    // স্যাম্পল স্টুডেন্ট লিস্ট
    const students = [
        {id: 7, name: "Abdullah Al Mamun"},
        {id: 65, name: "Hasirul Islam Taaif"}
    ];

    async function sync() {
        const badge = document.getElementById('live-indicator');
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getStatus`);
            const data = await res.json();
            currentLec = parseInt(data.lec);
            
            if(currentLec > 0) {
                badge.className = "status-badge active-class";
                badge.innerHTML = `<i class="fa-solid fa-wifi fa-fade"></i> লেকচার ${currentLec} চলছে`;
                document.getElementById('att-btn').disabled = false;
            } else {
                badge.className = "status-badge no-class";
                badge.innerHTML = `<i class="fa-solid fa-lock"></i> বর্তমানে ক্লাস বন্ধ`;
                document.getElementById('att-btn').disabled = true;
            }
        } catch(e) { console.log("Sync Error"); }
    }

    async function initiateClass() {
        const name = document.getElementById('t-name').value;
        notify("সার্ভার সিঙ্ক হচ্ছে...", "#1e3a8a");
        
        await fetch(SCRIPT_URL, {
            method: 'POST', mode: 'no-cors',
            body: JSON.stringify({ action: "startClass", teacher: name })
        });

        // সিঙ্ক করে লেকচার নাম্বার আনা
        setTimeout(async () => {
            await sync();
            const qr = document.getElementById('qrcode');
            qr.style.display = 'block'; qr.innerHTML = '';
            new QRCode(qr, { text: "MATH-"+currentLec, width: 180, height: 180 });
            notify("ক্লাস শুরু হয়েছে! ✅", "#10b981");
        }, 1000);
    }

    async function postAttendance() {
        const val = document.getElementById('std-name').value;
        if(!val) return notify("নাম সিলেক্ট করুন!", "#e11d48");
        
        notify("হাজিরা জমা হচ্ছে...", "#1e3a8a");
        await fetch(SCRIPT_URL, {
            method: 'POST', mode: 'no-cors',
            body: JSON.stringify({ action: "submit", roll: val, lec: currentLec })
        });
        notify("সফলভাবে হাজিরা সম্পন্ন! 🎉", "#10b981");
    }

    async function wipeData() {
        if(confirm("আপনি কি নিশ্চিত? সব রিপোর্ট মুছে যাবে!")) {
            await fetch(SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ action: "reset" })
            });
            notify("সব ডাটা মুছে ফেলা হয়েছে!", "#e11d48");
            setTimeout(() => location.reload(), 1500);
        }
    }

    function login() {
        if(document.getElementById('pin').value === "2026") {
            document.getElementById('admin-login').style.display = 'none';
            document.getElementById('admin-controls').style.display = 'block';
        } else { alert("ভুল পিন!"); }
    }

    function switchTab(t) {
        document.getElementById('teacher-section').style.display = t === 'teacher' ? 'block' : 'none';
        document.getElementById('student-section').style.display = t === 'student' ? 'block' : 'none';
        document.getElementById('t-tab').classList.toggle('active', t === 'teacher');
        document.getElementById('s-tab').classList.toggle('active', t === 'student');
        if(t === 'student') sync();
    }

    function notify(m, c) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.backgroundColor = c; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    window.onload = () => {
        const sel = document.getElementById('std-name');
        students.forEach(s => sel.add(new Option(`${s.id}. ${s.name}`, s.id)));
        sync();
    }
</script>
</body>
</html>
