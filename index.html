<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Dept Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #1e3a8a; --accent: #fbbf24; --danger: #ef4444; --success: #059669; }
        body { font-family: 'Hind Siliguri', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; }
        .card { background: white; max-width: 450px; margin: auto; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .tab-box { display: flex; background: #f1f5f9; border-radius: 12px; padding: 5px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; border-radius: 10px; font-weight: bold; }
        .tab.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-main { background: var(--primary); color: white; }
        .status { font-size: 14px; margin-bottom: 10px; color: #66748b; font-weight: bold; }
        #msg { margin-top: 15px; padding: 10px; border-radius: 8px; font-size: 14px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="tab-box">
        <div id="s-tab" class="tab active" onclick="switchView('student')">শিক্ষার্থী</div>
        <div id="t-tab" class="tab" onclick="switchView('teacher')">শিক্ষক</div>
    </div>

    <div id="student-section">
        <div id="lec-status" class="status">সার্ভার চেক করা হচ্ছে...</div>
        <select id="student-select">
            <option value="">আপনার নাম সিলেক্ট করুন</option>
        </select>
        <button class="btn btn-main" onclick="verifyLocation()">✅ হাজিরা দিন</button>
    </div>

    <div id="teacher-section" style="display:none;">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn btn-main" onclick="login()">লগইন</button>
        <div id="panel" style="display:none; margin-top:20px;">
            <select id="teacher-select">
               <option value="">-- শিক্ষক সিলেক্ট করুন --</option>
                <option value="MR">Dr. Md Motlubar Rahman (MR)</option>
                <option value="RI">Md. Rafiqul Islam (RI)</option>
                <option value="ZH">Zakir Hossain (ZH)</option>
                <option value="RA">Roksana Akter (RA)</option>
                <option value="NJ">Nazia Jahan (NJ)</option>
                <option value="BF">Bibi Fatema (BF)</option>
                <option value="MC">Milton Chowdhury (MC)</option>
            </select>
            <button class="btn btn-main" onclick="startLec()">▶️ লেকচার শুরু করুন</button>
            <div id="qrcode" style="margin:20px auto; display:flex; justify-content:center;"></div>
        </div>
    </div>
    <div id="msg"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzknNXrN3TnFnbqudMwA1sXwLdxfDMzv0rzL_BMV6h-4rM6tVEnVY4V8e_VEQD20R9F/exec";
    const DEPT = { lat: 23.781898, lon: 90.408503 }; // তিতুমীর কলেজ ম্যাথ ডিপার্টমেন্ট
    let currentLec = 0;

    // শিক্ষার্থীরা (আপনার JSON থেকে নেওয়া)
    const students = [
        {"sl": 181, "reg": "2021736018", "name": "MD ALOMGIR HOSSAIN"}, {"sl": 182, "reg": "2021835973", "name": "M. F. ROHAN"}, {"sl": 183, "reg": "2021436057", "name": "FARDIN ISLAM NOBIN"}, {"sl": 184, "reg": "2021236121", "name": "MD. MIRAZUL ISLAM"}, {"sl": 185, "reg": "2021336058", "name": "MD. RAKIB HOSEN"}, {"sl": 186, "reg": "2021135998", "name": "ASIM KUMAR SEN"}, {"sl": 187, "reg": "2021936043", "name": "MD. HAFIZUR RAHMAN"}, {"sl": 188, "reg": "2021035953", "name": "FARIA TASNIM"}, {"sl": 189, "reg": "2021036132", "name": "MOHAMMAD SOHEL RANA"}, {"sl": 190, "reg": "2020749691", "name": "SAGAR MAHMUD"},
        {"sl": 191, "reg": "2020849618", "name": "IMRAN HOSSAIN"}, {"sl": 192, "reg": "2020049616", "name": "MD. MEHEDI HASAN"}, {"sl": 193, "reg": "2021936106", "name": "MOHIMA AKTER"}, {"sl": 194, "reg": "2021735956", "name": "MD. MUBAROK HOSEIN"}, {"sl": 195, "reg": "2021136131", "name": "MD. ASIFUR RAHAMAN SAKIB"}, {"sl": 196, "reg": "2020749574", "name": "MD. ARIF BHUIYAN"}, {"sl": 197, "reg": "18737020468", "name": "MD. ABDUR RAZZAK"}, {"sl": 198, "reg": "2021836116", "name": "MD. SAKIL MIAH"}, {"sl": 199, "reg": "2020349631", "name": "MD. TITUMIR ANAN"}, {"sl": 200, "reg": "2020049760", "name": "MOHIBUL MONTASIR"},
        {"sl": 201, "reg": "2020449487", "name": "MD. FAYSAL ISLAM BHUIYAN"}, {"sl": 202, "reg": "2021935936", "name": "ANTOR HOSSAIN"}, {"sl": 203, "reg": "2021236095", "name": "MD. A. ROKIB"}, {"sl": 204, "reg": "2021235933", "name": "NAIMOR RAHMAN"}, {"sl": 205, "reg": "2020149714", "name": "MD. NADIM ALI"}, {"sl": 206, "reg": "2021036105", "name": "MD. SUJAN MIA"}, {"sl": 207, "reg": "2020449694", "name": "OMAYER HOSSAIN"}, {"sl": 208, "reg": "2020449702", "name": "ABU RAYHAN"}, {"sl": 209, "reg": "2020749565", "name": "MD. BADSHA HOSEN"}, {"sl": 210, "reg": "2020749655", "name": "ARIF HASAN"}, {"sl": 211, "reg": "2021935990", "name": "MD. SHAHEEN ALOM"}, {"sl": 212, "reg": "2021235924", "name": "MD. JONAYED ISLAM JUWEL"}, {"sl": 213, "reg": "2020949608", "name": "MD. JEWEL MAHMUD HASAN"}, {"sl": 214, "reg": "2021936061", "name": "MD. AMRAN ALI"}, {"sl": 215, "reg": "2021636154", "name": "MD. RAKIBUL HASAN"}
    ];
  

    async function checkStatus() {
        try {
            let res = await fetch(`${SCRIPT_URL}?action=getStatus`);
            let data = await res.json();
            currentLec = data.lec;
            document.getElementById('lec-status').innerText = currentLec > 0 ? `চলমান: লেকচার ${currentLec}` : "কোনো লেকচার চালু নেই";
        } catch(e) { document.getElementById('lec-status').innerText = "সার্ভার অফলাইন"; }
    }

    function verifyLocation() {
        if(currentLec == 0) return showMsg("বর্তমানে কোনো ক্লাস নেই!", "red");
        
        showMsg("লোকেশন চেক করা হচ্ছে...", "blue");
        navigator.geolocation.getCurrentPosition(async (pos) => {
            let dist = getDist(pos.coords.latitude, pos.coords.longitude, DEPT.lat, DEPT.lon);
            if(dist > 0.2) return showMsg("আপনি ক্যাম্পাসের বাইরে!", "red");

            let roll = document.getElementById('student-select').value;
            if(!roll) return showMsg("নাম সিলেক্ট করুন!", "red");

            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: "submitAttendance", roll: roll, lecture: currentLec, teacher: "System" })
            });
            showMsg("হাজিরা সফল হয়েছে! ✅", "green");
        }, () => showMsg("জিপিএস অন করুন!", "red"), {enableHighAccuracy: true});
    }

    function getDist(lat1, lon1, lat2, lon2) {
        let R = 6371;
        let dLat = (lat2-lat1)*Math.PI/180;
        let dLon = (lon2-lon1)*Math.PI/180;
        let a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    async function startLec() {
        currentLec++;
        await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: "updateLecture", lecture: currentLec, locked: false })
        });
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: "LEC-"+currentLec, width: 150, height: 150 });
        showMsg("লেকচার " + currentLec + " শুরু!", "green");
        checkStatus();
    }

    function login() {
        if(document.getElementById('pass').value === "TMC@2026") {
            document.getElementById('panel').style.display = "block";
        } else alert("ভুল পাসওয়ার্ড");
    }

    function switchView(v) {
        document.getElementById('student-section').style.display = v === 'student' ? 'block' : 'none';
        document.getElementById('teacher-section').style.display = v === 'teacher' ? 'block' : 'none';
        document.getElementById('s-tab').className = v === 'student' ? 'tab active' : 'tab';
        document.getElementById('t-tab').className = v === 'teacher' ? 'tab active' : 'tab';
    }

    function showMsg(t, c) {
        let m = document.getElementById('msg');
        m.style.display = "block"; m.innerText = t;
        m.style.background = c === 'red' ? '#fee2e2' : c === 'green' ? '#dcfce7' : '#e0f2fe';
    }

    window.onload = () => {
        let s = document.getElementById('student-select');
        students.forEach(st => s.add(new Option(`${st.sl}. ${st.name}`, st.sl)));
        checkStatus();
    }
</script>
</body>
</html>
