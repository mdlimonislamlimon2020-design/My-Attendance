
<!DOCTYPE html>
<html>
<head><title>Student</title></head>
<body>

<h2>Attendance</h2>

<input id="sl">
<button onclick="submit()">Submit</button>

<script src="js/app.js"></script>
<script>
function submit(){
 if(!DB.activeToken){alert("No class");return;}
 let sl=document.getElementById('sl').value;
 if(!DB.attendance[sl]) DB.attendance[sl]={};
 DB.attendance[sl][DB.currentLecture]=true;
 saveDB();
 alert("Done");
}
</script>

</body>
</html>
